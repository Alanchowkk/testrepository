name: Auto Release Assets

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0, v1.0.1, etc.

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            test-app.apk
            test-app.exe
          name: Release ${{ github.ref_name }}
          body: |
            这是一个由 GitHub Actions 自动生成的测试版本。
            
            ### 📦 包含附件：
            - `test-app.apk` (测试伪 APK)
            - `test-app.exe` (测试伪 EXE)
            
            由 Antigravity AI 自动配置并触发。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
